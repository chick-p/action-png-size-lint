name: eslint
on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  eslint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./.node-version
          cache: "npm"

      - name: npm ci
        run: |
          npm ci
        env:
          CI: true

      - name: npm run lint
        run: |
          npm run lint
