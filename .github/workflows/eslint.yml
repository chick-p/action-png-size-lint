name: eslint
on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  eslint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./.node-version
          cache: "npm"

      - name: npm ci
        run: |
          npm ci
        env:
          CI: true

      - name: npm run lint
        run: |
          npm run lint
