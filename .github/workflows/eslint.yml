name: eslint
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ./.node-version
          cache: "npm"

      - name: npm ci
        run: |
          npm ci
        env:
          CI: true

      - name: npm run lint
        run: |
          npm run lint
